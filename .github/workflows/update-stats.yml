name: Update Stats
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats SVG
        run: |
          mkdir -p profile
          curl -s "https://github-readme-stats.vercel.app/api?username=yjt0907&show_icons=true&theme=radical&count_private=true&include_all_commits=true" > profile/stats.svg
          curl -s "https://github-readme-stats.vercel.app/api/top-langs?username=yjt0907&layout=compact&theme=radical&count_private=true" > profile/top-langs.svg

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/
          if ! git diff --quiet --staged; then
            git commit -m "chore: update stats [skip ci]"
            git push
          fi
